name: Deploy
on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    check:
        name: Check
        runs-on: ubuntu-latest

        permissions:
            contents: read

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Install Nix
              uses: DeterminateSystems/nix-installer-action@v16

            - name: Install dependencies
              run: nix develop -c bun install --frozen-lockfile

            - name: Typecheck
              run: nix develop -c bun run typecheck

            - name: Build application
              env:
                  VITE_CONVEX_URL: https://placeholder.convex.cloud
              run: nix develop -c bun run build

    deploy:
        name: Deploy
        runs-on: ubuntu-latest
        needs: check
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'

        permissions:
            contents: read

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Install Nix
              uses: DeterminateSystems/nix-installer-action@v16

            - name: Install dependencies
              run: nix develop -c bun install --frozen-lockfile

            - name: Deploy Convex and build production assets
              env:
                  CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
              run: nix develop -c bun run deploy:convex:ci

            - name: Deploy to Cloudflare Pages
              env:
                  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
              run: nix develop -c bun run deploy:cf
